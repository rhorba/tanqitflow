[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501", "N818"]

[tool.ruff.lint.isort]
known-first-party = ["config", "database", "routers", "middleware", "models", "services", "domain", "repositories", "tasks", "core", "schemas"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=. --cov-omit=tests/*,alembic/* --cov-report=term-missing"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.coverage.run]
omit = ["tests/*", "alembic/*", "*/migrations/*"]
