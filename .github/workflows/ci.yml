name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: cd api && ruff check .

  test-backend:
    name: Test (Python — coverage ≥80%)
    runs-on: ubuntu-latest
    needs: lint-backend
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: tanqit
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: tanqitflow_test
        options: >-
          --health-cmd "pg_isready -U tanqit -d tanqitflow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://tanqit:testpassword@localhost:5432/tanqitflow_test
      DATABASE_SYNC_URL: postgresql+psycopg2://tanqit:testpassword@localhost:5432/tanqitflow_test
      REDIS_URL: redis://localhost:6379/0
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: testkey
      MINIO_SECRET_KEY: testsecret
      JWT_SECRET: ci-test-jwt-secret-not-for-production
      PII_ENCRYPTION_KEY: dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ=
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: api/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r api/requirements-dev.txt
      - name: Run tests with coverage
        run: |
          cd api
          pytest --cov=. --cov-omit="tests/*,alembic/*" --cov-report=term-missing --cov-fail-under=80
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: api/htmlcov/

  lint-frontend:
    name: Lint (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint

  build-frontend:
    name: Build (Vite)
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
